name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: |
        docker build -t portfolio-app:latest .

    - name: Test Docker image
      run: |
        docker run -d -p 3000:3000 --name test-container portfolio-app:latest
        sleep 5
        curl http://localhost:3000/health
        docker stop test-container
        docker rm test-container

    - name: Deploy to EC2 with Kubernetes
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ec2-user/app
          git pull origin main
          docker build -t portfolio-app:latest .
          docker save portfolio-app:latest | minikube image load --overwrite=true -
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout restart deployment portfolio-app
          kubectl rollout status deployment portfolio-app
          echo "Deployed successfully to Kubernetes!"
